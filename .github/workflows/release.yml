# Creates a GitHub Release after a version tag passes the production checks.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Verify and publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout project
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check code style
        run: npm run lint

      - name: Build production app
        run: npm run build

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="$VERSION" '
            $0 == "## v" version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            printf "See CHANGELOG.md for changes in %s.\n" "$GITHUB_REF_NAME" > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md --verify-tag
